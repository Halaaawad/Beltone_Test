name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d

      - name: Show running containers
        run: docker ps

      - name: Stop containers
        if: always()
        run: docker compose down